name: CI

on:
  push:
    branches-ignore:
      - main
      - gh-pages
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Lint and build debug APK
        run: ./gradlew :app:ktlintCheck :app:assembleDebug --no-daemon
